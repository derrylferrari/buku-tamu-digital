<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Buku Tamu Digital</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />

  <style>
    .admin-card { display: none; }

    .stats-box {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stat-item {
      background: white;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .toolbar input {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .ghost-btn {
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #f1f5f9;
    }
  </style>
</head>

<body>

<main>
  <!-- LOGIN -->
  <section id="loginCard">
    <h2>Login Admin</h2>

    <form id="loginForm">
      <input type="email" id="adminEmail" placeholder="Email" required><br><br>
      <input type="password" id="adminPassword" placeholder="Password" required><br><br>
      <button type="submit">Login</button>
    </form>

    <p id="loginMessage"></p>
  </section>

  <!-- DASHBOARD -->
  <section id="adminCard" class="admin-card">

    <h2>Dashboard Admin</h2>

    <button id="logoutBtn" class="ghost-btn">Logout</button>

    <!-- 📊 STATISTIK -->
    <div id="stats" class="stats-box"></div>

    <!-- 🔍 FILTER + AKSI -->
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Cari...">

      <input type="date" id="filterTanggal">
      <input type="text" id="filterInstansi" placeholder="Filter Instansi">

      <button id="filterBtn" class="ghost-btn">Filter</button>
      <button id="refreshBtn" class="ghost-btn">Refresh</button>
      <button id="exportBtn" class="ghost-btn">Ekspor Excel</button>
    </div>

    <!-- 📋 TABEL -->
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>Instansi</th>
          <th>No HP</th>
          <th>Email</th>
          <th>Tujuan</th>
          <th>Keperluan</th>
          <th>Tanggal</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="guestTableBody">
        <tr><td colspan="9">Memuat data...</td></tr>
      </tbody>
    </table>

  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>

</body>
</html>
