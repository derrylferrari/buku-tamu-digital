<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Buku Tamu Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .admin-shell {
      width: 100%;
      max-width: 1200px;
      margin-top: 24px;
    }

    .admin-card,
    .login-card {
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(15,23,42,0.16);
      backdrop-filter: blur(8px);
    }

    .login-card {
      max-width: 460px;
      margin: 48px auto 0;
      padding: 32px;
    }

    .login-card h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    .login-card p {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .admin-card {
      display: none;
      overflow: hidden;
    }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: white;
    }

    .admin-topbar h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    .admin-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .ghost-btn,
    .danger-btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .ghost-btn {
      background: white;
      color: var(--primary-dark);
    }

    .danger-btn {
      background: #dc2626;
      color: white;
    }

    .admin-content {
      padding: 24px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .toolbar input {
      max-width: 320px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      background: white;
    }

    thead {
      background: #eff6ff;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
      font-size: 0.95rem;
    }

    th {
      color: var(--primary-dark);
      font-weight: 700;
    }

    .empty-state {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .small-btn {
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: #ef4444;
      color: white;
    }

    #adminMessage {
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>

  <main class="admin-page">
    <div class="admin-shell">
      <section id="loginCard" class="login-card">
        <h1>Login Admin</h1>
        <p>Masuk untuk mengakses dashboard buku tamu digital.</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="adminEmail">Email</label>
            <input type="email" id="adminEmail" placeholder="Masukkan email admin" required />
          </div>

          <div class="form-group" style="margin-top:16px;">
            <label for="adminPassword">Password</label>
            <input type="password" id="adminPassword" placeholder="Masukkan password" required />
          </div>

          <button type="submit" id="loginBtn" class="submit-btn">Login</button>
          <p id="loginMessage" class="form-message" aria-live="polite"></p>
        </form>
      </section>

      <section id="adminCard" class="admin-card">
        <div class="admin-topbar">
          <h1>Admin Buku Tamu Digital</h1>
          <div class="admin-actions">
            <span id="adminEmailLabel"></span>
            <button id="logoutBtn" class="ghost-btn">Logout</button>
          </div>
        </div>

        <div class="admin-content">
          <div class="toolbar">
            <input type="text" id="searchInput" placeholder="Cari nama, instansi, tujuan..." />
            <button id="refreshBtn" class="ghost-btn">Refresh</button>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>No</th>
                  <th>Nama Lengkap</th>
                  <th>Instansi</th>
                  <th>No HP</th>
                  <th>Email</th>
                  <th>Tujuan / PIC</th>
                  <th>Keperluan</th>
                  <th>Tanggal</th>
                  <th>Dibuat</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="guestTableBody">
                <tr>
                  <td colspan="10" class="empty-state">Memuat data...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <p id="adminMessage" class="form-message" aria-live="polite"></p>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
